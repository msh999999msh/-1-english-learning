<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعلم الإنجليزية ببساطة - مع شرح صوتي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f0f4f8;
        }
        .lesson-card {
            transition: transform 0.2s;
        }
        .lesson-card:hover {
            transform: translateY(-5px);
        }
        .loading-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Header -->
    <header class="bg-indigo-600 text-white p-6 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">🇬🇧 تعلم الإنجليزية بالصوت</h1>
            <nav>
                <button onclick="showSection('home')" class="px-4 py-2 hover:bg-indigo-700 rounded transition">الرئيسية</button>
                <button onclick="showSection('lessons')" class="px-4 py-2 hover:bg-indigo-700 rounded transition">الدروس</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto p-4 mt-6">
        
        <!-- Home Section -->
        <section id="home-section" class="text-center py-12">
            <h2 class="text-4xl font-bold text-indigo-800 mb-4">أهلاً بك في رحلة تعلم الإنجليزية!</h2>
            <p class="text-lg text-gray-600 mb-8">تعلم القواعد الأساسية واستمع إلى شرح مفصل لكل قاعدة بضغطة زر.</p>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-indigo-500">
                    <span class="text-4xl">🔊</span>
                    <h3 class="font-bold mt-2 text-xl">شرح صوتي ذكي</h3>
                    <p class="text-sm text-gray-500">استمع لدروسك بوضوح تام.</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-green-500">
                    <span class="text-4xl">🏗️</span>
                    <h3 class="font-bold mt-2 text-xl">بناء الجمل</h3>
                    <p class="text-sm text-gray-500">تعرف على الهيكل الصحيح للجملة.</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-yellow-500">
                    <span class="text-4xl">🎯</span>
                    <h3 class="font-bold mt-2 text-xl">تمارين تفاعلية</h3>
                    <p class="text-sm text-gray-500">اختبر معلوماتك فوراً.</p>
                </div>
            </div>
            <button onclick="showSection('lessons')" class="mt-10 bg-indigo-600 text-white px-8 py-3 rounded-full text-lg font-bold shadow-xl hover:bg-indigo-700">ابدأ الآن</button>
        </section>

        <!-- Lessons Selection Section -->
        <section id="lessons-section" class="hidden">
            <h2 class="text-3xl font-bold text-gray-800 mb-8 text-center">اختر درساً للبدء</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto" id="lessons-grid">
                <!-- Lessons will be populated here -->
            </div>
        </section>

        <!-- Lesson Content Area -->
        <section id="content-section" class="hidden max-w-3xl mx-auto bg-white rounded-2xl shadow-2xl p-8">
            <div id="lesson-header" class="flex justify-between items-start mb-6">
                <div id="lesson-title-container">
                    <!-- Title injected here -->
                </div>
                <button id="audio-btn" onclick="playLessonAudio()" class="flex items-center gap-2 bg-indigo-100 text-indigo-700 px-4 py-2 rounded-full hover:bg-indigo-200 transition font-bold">
                    <span id="audio-icon">🔊</span>
                    <span id="audio-text">استمع للشرح</span>
                </button>
            </div>
            
            <div id="lesson-body" class="mb-8">
                <!-- Content injected here -->
            </div>

            <div class="mt-8 pt-6 border-t flex justify-between">
                <button onclick="showSection('lessons')" class="text-gray-500 hover:text-indigo-600">← العودة للدروس</button>
                <button id="quiz-btn" class="bg-green-500 text-white px-6 py-2 rounded-lg hover:bg-green-600 hidden">اختبر نفسك</button>
            </div>
        </section>

        <!-- Quiz Area -->
        <section id="quiz-section" class="hidden max-w-3xl mx-auto bg-white rounded-2xl shadow-2xl p-8">
            <h2 id="quiz-title" class="text-2xl font-bold mb-6 text-indigo-700">تحدي السرعة ⚡</h2>
            <div id="quiz-body" class="space-y-6">
                <!-- Quiz content will be injected -->
            </div>
            <div class="mt-8 pt-6 border-t flex justify-center">
                <button onclick="showSection('lessons')" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300">إنهاء</button>
            </div>
        </section>

    </main>

    <script>
        const apiKey = ""; // API key is handled by the environment
        let currentLessonId = null;
        let isSpeaking = false;

        const lessonsData = {
            1: {
                title: "هيكل الجملة البسيطة",
                description: "مبتدأ + فعل + مفعول به",
                audioScript: "أهلاً بك في الدرس الأول. تذكر دائماً أن الجملة الإنجليزية تشبه القطار، تبدأ دائماً بالفاعل مثل أنا أو أحمد، ثم الفعل الذي يعبر عن الحركة، وأخيراً المفعول به. مثلاً جملة (أنا آكل تفاحة) تصبح آي إيت أن أبل. تذكر: لا توجد جملة بدون فعل في الإنجليزية!",
                content: `
                    <div class="space-y-4">
                        <div class="bg-indigo-50 p-4 rounded-lg border-r-4 border-indigo-500 text-center text-xl font-bold">
                            Subject (الفاعل) + Verb (الفعل) + Object (المفعول به)
                        </div>
                        <h4 class="font-bold text-lg text-indigo-600">أمثلة:</h4>
                        <ul class="list-disc pr-6 space-y-2">
                            <li><span class="font-bold text-blue-600">I</span> <span class="font-bold text-green-600">eat</span> <span class="font-bold text-red-600">an apple</span>.</li>
                            <li><span class="font-bold text-blue-600">Ahmed</span> <span class="font-bold text-green-600">plays</span> <span class="font-bold text-red-600">football</span>.</li>
                        </ul>
                    </div>
                `,
                quiz: [
                    { q: "رتب الجملة: (Apple - I - eat)", options: ["I eat apple", "Apple I eat", "Eat I apple"], correct: 0 },
                    { q: "أي كلمة هي 'الفعل' في: She reads a book?", options: ["She", "Reads", "Book"], correct: 1 }
                ]
            },
            2: {
                title: "الضمائر الشخصية",
                description: "I, You, He, She, It...",
                audioScript: "في هذا الدرس سنتعرف على الضمائر. نستخدم آي للتحدث عن أنفسنا، وهِي للمذكر، وشِي للمؤنث، وإِت لغير العاقل مثل القطة أو الكرسي. عندما نتحدث لمجموعة نستخدم ذَي. هذه الكلمات هي مفاتيح بناء أي جملة في اللغة الإنجليزية.",
                content: `
                    <div class="space-y-4">
                        <table class="w-full text-right border-collapse">
                            <thead><tr class="bg-gray-100"><th class="p-2 border">الضمير</th><th class="p-2 border">المعنى</th></tr></thead>
                            <tbody>
                                <tr><td class="p-2 border font-bold">I</td><td class="p-2 border">أنا</td></tr>
                                <tr><td class="p-2 border font-bold">He</td><td class="p-2 border">هو</td></tr>
                                <tr><td class="p-2 border font-bold">She</td><td class="p-2 border">هي</td></tr>
                                <tr><td class="p-2 border font-bold">It</td><td class="p-2 border">هو/هي (غير عاقل)</td></tr>
                                <tr><td class="p-2 border font-bold">They</td><td class="p-2 border">هم</td></tr>
                            </tbody>
                        </table>
                    </div>
                `,
                quiz: [
                    { q: "ما هو الضمير المناسب لـ 'عمر'؟", options: ["She", "He", "It"], correct: 1 },
                    { q: "ماذا يعني الضمير 'They'؟", options: ["هم", "نحن", "أنا"], correct: 0 }
                ]
            }
            // Add more lessons as needed
        };

        function initApp() {
            const grid = document.getElementById('lessons-grid');
            Object.keys(lessonsData).forEach(id => {
                const lesson = lessonsData[id];
                const div = document.createElement('div');
                div.className = "lesson-card bg-white p-6 rounded-xl shadow-lg cursor-pointer border hover:border-indigo-500";
                div.onclick = () => openLesson(id);
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="bg-blue-100 p-3 rounded-full text-blue-600 font-bold">${id}</div>
                        <div>
                            <h3 class="font-bold text-xl">${lesson.title}</h3>
                            <p class="text-gray-500">${lesson.description}</p>
                        </div>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        async function playLessonAudio() {
            if (isSpeaking) return;
            
            const lesson = lessonsData[currentLessonId];
            if (!lesson || !lesson.audioScript) return;

            const audioBtn = document.getElementById('audio-btn');
            const audioText = document.getElementById('audio-text');
            const audioIcon = document.getElementById('audio-icon');

            try {
                isSpeaking = true;
                audioBtn.classList.add('loading-pulse');
                audioText.innerText = "جاري تحضير الشرح...";
                audioIcon.innerText = "⏳";

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `بصوت ودود وتعليمي اشرح التالي باللغة العربية: ${lesson.audioScript}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                        },
                        model: "gemini-2.5-flash-preview-tts"
                    })
                });

                const result = await response.json();
                const audioData = result.candidates[0].content.parts[0].inlineData.data;
                
                // Convert PCM to WAV and play
                const audioBlob = pcmToWav(audioData, 24000);
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                
                audioText.innerText = "جاري الشرح الآن...";
                audioIcon.innerText = "🔊";
                
                audio.play();
                audio.onended = () => {
                    resetAudioBtn();
                };
            } catch (error) {
                console.error("TTS Error:", error);
                alert("عذراً، حدث خطأ أثناء تشغيل الصوت.");
                resetAudioBtn();
            }
        }

        function resetAudioBtn() {
            isSpeaking = false;
            const audioBtn = document.getElementById('audio-btn');
            audioBtn.classList.remove('loading-pulse');
            document.getElementById('audio-text').innerText = "استمع للشرح";
            document.getElementById('audio-icon').innerText = "🔊";
        }

        function pcmToWav(base64Data, sampleRate) {
            const buffer = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0)).buffer;
            const length = buffer.byteLength;
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);

            view.setUint32(0, 0x52494646, false); // "RIFF"
            view.setUint32(4, 36 + length, true);
            view.setUint32(8, 0x57415645, false); // "WAVE"
            view.setUint32(12, 0x666d7420, false); // "fmt "
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); // "data"
            view.setUint32(40, length, true);

            return new Blob([wavHeader, buffer], { type: 'audio/wav' });
        }

        function showSection(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id + '-section').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function openLesson(id) {
            currentLessonId = id;
            const lesson = lessonsData[id];
            document.getElementById('lesson-title-container').innerHTML = `<h2 class="text-3xl font-bold text-indigo-700">${lesson.title}</h2>`;
            document.getElementById('lesson-body').innerHTML = lesson.content;
            
            const quizBtn = document.getElementById('quiz-btn');
            quizBtn.classList.remove('hidden');
            quizBtn.onclick = () => startQuiz(id);
            
            resetAudioBtn();
            showSection('content');
        }

        function startQuiz(id) {
            const lesson = lessonsData[id];
            const quizBody = document.getElementById('quiz-body');
            quizBody.innerHTML = lesson.quiz.map((q, qIndex) => `
                <div class="bg-gray-50 p-4 rounded-lg shadow-sm border">
                    <p class="font-bold text-lg mb-3">${qIndex + 1}. ${q.q}</p>
                    <div class="grid gap-2">
                        ${q.options.map((opt, oIndex) => `
                            <button onclick="checkAnswer(${id}, ${qIndex}, ${oIndex}, this)" 
                                    class="text-right p-3 rounded-md bg-white border hover:bg-indigo-50 transition">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            showSection('quiz');
        }

        function checkAnswer(lessonId, qIndex, selectedIndex, btn) {
            const lesson = lessonsData[lessonId];
            const correctIndex = lesson.quiz[qIndex].correct;
            const buttons = btn.parentElement.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);
            
            if (selectedIndex === correctIndex) {
                btn.classList.add('bg-green-100', 'border-green-500', 'text-green-700');
                btn.innerHTML += " ✅";
            } else {
                btn.classList.add('bg-red-100', 'border-red-500', 'text-red-700');
                btn.innerHTML += " ❌";
                buttons[correctIndex].classList.add('bg-green-50', 'border-green-300');
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
