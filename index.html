<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أكاديمية القواعد الإنجليزية</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-gray-100 text-gray-800">

<header class="bg-indigo-600 text-white p-6">

<div class="max-w-6xl mx-auto flex justify-between">

<h1 class="text-2xl font-bold">
🇬🇧 أكاديمية القواعد
</h1>

<nav class="flex gap-4">

<button onclick="showSection('home')">الرئيسية</button>
<button onclick="showSection('lessons')">الدروس</button>

</nav>

</div>

</header>



<main class="max-w-6xl mx-auto p-6">

<section id="home-section" class="text-center py-20">

<h2 class="text-4xl font-bold mb-6">

تعلم قواعد الإنجليزية

</h2>

<button onclick="showSection('lessons')"
class="bg-indigo-600 text-white px-6 py-3 rounded-lg">

ابدأ التعلم

</button>

</section>



<section id="lessons-section" class="hidden">

<h2 class="text-3xl font-bold text-center mb-10">

الدروس

</h2>

<div id="lessons-grid" class="grid md:grid-cols-3 gap-6">

</div>

</section>



<section id="content-section"
class="hidden bg-white p-10 rounded-xl shadow max-w-3xl mx-auto">

<div class="flex justify-between mb-6">

<div id="lesson-title"></div>

<button onclick="playLessonAudio()"
class="bg-indigo-100 px-4 py-2 rounded-lg">

🔊 شرح صوتي

</button>

</div>

<div id="lesson-content"></div>

</section>


</main>



<script>

let currentLesson=0

const lessons={

1:{
title:"هيكل الجملة",
content:`
<p>الجملة الإنجليزية تتكون من:</p>
<b>Subject + Verb + Object</b>

<p>مثال:</p>

I eat apples
`
},

2:{
title:"الضمائر",
content:`
I
You
He
She
We
They
`
},

3:{
title:"فعل الكينونة",
content:`
I am
He is
They are
`
}

}



function playLessonAudio(){

if(currentLesson==1){

const audio=new Audio("lesson1.wav")

audio.play()

}else{

alert("سيتم إضافة الصوت لاحقاً")

}

}



function init(){

const grid=document.getElementById("lessons-grid")

Object.keys(lessons).forEach(id=>{

const lesson=lessons[id]

const card=document.createElement("div")

card.className="bg-white p-6 rounded-lg shadow cursor-pointer"

card.onclick=()=>openLesson(id)

card.innerHTML=`

<h3 class="text-xl font-bold">

${lesson.title}

</h3>

`

grid.appendChild(card)

})

}



function openLesson(id){

currentLesson=id

const lesson=lessons[id]

document.getElementById("lesson-title").innerHTML=

`<h2 class="text-2xl font-bold">${lesson.title}</h2>`

document.getElementById("lesson-content").innerHTML=

lesson.content

showSection("content")

}



function showSection(name){

["home","lessons","content"].forEach(s=>{

document.getElementById(s+"-section").classList.add("hidden")

})

document.getElementById(name+"-section").classList.remove("hidden")

}



init()

</script>


</body>
</html>
