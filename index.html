<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite English Academy</title>

<style>

:root{
--bg:#07101f;
--bg2:#0b1220;
--panel:#101a2f;
--panel2:#17233d;
--line:rgba(255,255,255,.08);
--text:#f8fafc;
--muted:#cbd5e1;
--primary:#6366f1;
--primary2:#8b5cf6;
--shadow:0 20px 60px rgba(0,0,0,.3);
--radius:24px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:tahoma;
background:linear-gradient(180deg,var(--bg),var(--bg2));
color:var(--text);
}

.container{
width:min(1200px,92%);
margin:auto;
}

.topbar{
padding:18px;
background:#081022;
border-bottom:1px solid var(--line);
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.brand-icon{
width:45px;
height:45px;
border-radius:12px;
background:linear-gradient(135deg,var(--primary),var(--primary2));
display:grid;
place-items:center;
font-size:20px;
}

.hero{
padding:40px 0;
}

.btn{
border:none;
border-radius:12px;
padding:10px 16px;
cursor:pointer;
background:#1c2742;
color:white;
}

.btn-primary{
background:linear-gradient(135deg,var(--primary),var(--primary2));
}

.card{
background:#0e1a33;
border:1px solid var(--line);
border-radius:var(--radius);
padding:24px;
}

.section{
padding:30px 0;
}

.levels-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:18px;
}

.level-card{
padding:20px;
border-radius:18px;
background:#0f1b34;
border:1px solid var(--line);
}

.lessons-list{
display:grid;
gap:10px;
}

.lesson-item{
padding:14px;
border-radius:14px;
border:1px solid var(--line);
cursor:pointer;
background:#0c1830;
}

.viewer{
padding:20px;
border:1px solid var(--line);
border-radius:16px;
min-height:300px;
background:#0c1830;
}

.footer{
padding:30px;
text-align:center;
border-top:1px solid var(--line);
margin-top:40px;
}

/* زر المطور */
.dev-btn{
position:fixed;
bottom:20px;
left:20px;
z-index:999;
background:linear-gradient(135deg,#9333ea,#6366f1);
padding:10px 16px;
border-radius:20px;
border:none;
color:white;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,.4);
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
}

.modal.show{
display:flex;
}

.modal-box{
background:#0e1a33;
padding:30px;
border-radius:20px;
width:350px;
}

.field{
margin-bottom:12px;
}

.field input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid var(--line);
background:#081022;
color:white;
}

</style>
</head>

<body>

<header class="topbar">
<div class="container brand">
<div class="brand-icon">🎓</div>
<div>
<h3>Elite English Academy</h3>
<p style="color:#aaa;margin:0">تعلم الإنجليزية</p>
</div>
</div>
</header>

<main class="container">

<section class="hero">
<div class="card">

<h2>تعلم الإنجليزية بسهولة</h2>

<p>
منصة تعليمية تحتوي على مستويات ودروس وشرح وأمثلة واختبارات.
</p>

<button class="btn btn-primary" onclick="startLearning()">ابدأ التعلم</button>

</div>
</section>

<section class="section">

<h3>المستويات</h3>

<div class="levels-grid" id="levelsGrid"></div>

</section>

<section class="section">

<h3>الدروس</h3>

<div class="lessons-list" id="lessonsList"></div>

<br>

<div class="viewer" id="lessonViewer">
اختر درس لعرضه
</div>

</section>

</main>

<footer class="footer">
Elite English Academy
</footer>

<!-- زر المطور -->
<button class="dev-btn" onclick="openAdminLogin()">المطور</button>

<!-- نافذة دخول المطور -->

<div class="modal" id="adminModal">

<div class="modal-box">

<h3>تسجيل دخول المطور</h3>

<div class="field">
<input id="user" placeholder="اسم المستخدم">
</div>

<div class="field">
<input id="pass" type="password" placeholder="كلمة المرور">
</div>

<button class="btn btn-primary" onclick="loginAdmin()">دخول</button>

<br><br>

<button class="btn" onclick="closeAdmin()">إغلاق</button>

</div>

</div>

<script>

const ADMIN_USERNAME="msh999"
const ADMIN_PASSWORD="123456"

const levels=[
{
id:1,
title:"Beginner",
lessons:[
{
id:101,
title:"Alphabet",
text:"الحروف الإنجليزية هي أساس اللغة."
},
{
id:102,
title:"Greetings",
text:"Hello تعني مرحبا"
}
]
},
{
id:2,
title:"Intermediate",
lessons:[
{
id:201,
title:"Sentences",
text:"تعلم الجمل الإنجليزية"
}
]
}
]

function renderLevels(){

const grid=document.getElementById("levelsGrid")

levels.forEach(level=>{

const card=document.createElement("div")

card.className="level-card"

card.innerHTML=`
<h4>${level.title}</h4>
<p>${level.lessons.length} دروس</p>
<button class="btn btn-primary" onclick="openLevel(${level.id})">فتح</button>
`

grid.appendChild(card)

})

}

function openLevel(id){

const level=levels.find(l=>l.id===id)

const list=document.getElementById("lessonsList")

list.innerHTML=""

level.lessons.forEach(lesson=>{

const div=document.createElement("div")

div.className="lesson-item"

div.innerText=lesson.title

div.onclick=()=>openLesson(lesson)

list.appendChild(div)

})

}

function openLesson(lesson){

document.getElementById("lessonViewer").innerHTML=`
<h3>${lesson.title}</h3>
<p>${lesson.text}</p>
`

}

function startLearning(){
openLevel(1)
}

function openAdminLogin(){
document.getElementById("adminModal").classList.add("show")
}

function closeAdmin(){
document.getElementById("adminModal").classList.remove("show")
}

function loginAdmin(){

const user=document.getElementById("user").value
const pass=document.getElementById("pass").value

if(user===ADMIN_USERNAME && pass===ADMIN_PASSWORD){

alert("تم الدخول كـ مطور")

closeAdmin()

}else{

alert("بيانات خاطئة")

}

}

renderLevels()

</script>

</body>
</html>
