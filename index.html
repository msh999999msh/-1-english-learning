<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الأكاديمية المتميزة - تجربة ممتعة</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            brand: { 
              primary: '#6366f1', 
              secondary: '#f43f5e',
              accent: '#f59e0b',
              soft: '#eef2ff'
            } 
          },
          borderRadius: { '4xl': '2rem' },
          fontFamily: { ar: ['IBM Plex Sans Arabic','sans-serif'], en: ['Outfit','sans-serif'] }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family:'IBM Plex Sans Arabic',sans-serif; 
      background: radial-gradient(circle at top right, #fdfcfb, #e2d1c333), #f8fafc;
      min-height: 100vh;
    }
    .english-snippet { direction:ltr; text-align:left; font-family:'Outfit',sans-serif; }
    
    /* حركات حيوية */
    .floating { animation: float 6s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    .card-gradient {
      background: linear-gradient(135deg, #ffffff 0%, #f9fafb 100%);
    }

    .playing-btn { 
      background: #6366f1 !important; 
      color: white !important; 
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
      transform: scale(0.95);
    }

    .audio-active::after { 
      content: ""; position: absolute; inset: -8px; 
      border: 3px solid #6366f1; border-radius: inherit; 
      animation: ripple 1.5s cubic-bezier(0, 0, 0.2, 1) infinite; 
    }
    @keyframes ripple {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(1.3); opacity: 0; }
    }

    .glass-nav {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
    }

    .lvl-card:hover { transform: translateY(-8px) rotate(1deg); }
  </style>
</head>
<body class="text-slate-800">

<!-- الهيدر بشكل عصري -->
<header class="glass-nav border-b border-white/50 sticky top-0 z-40">
  <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
    <button onclick="navigate('home')" class="flex items-center gap-3 group">
      <div class="w-12 h-12 bg-gradient-to-tr from-brand-primary to-purple-500 text-white flex items-center justify-center rounded-2xl text-2xl shadow-lg transition-transform group-hover:rotate-12">✨</div>
      <div class="text-right">
        <div class="font-bold text-lg text-slate-900 tracking-tight">The Elite Academy</div>
        <div class="text-[9px] english-snippet text-brand-primary font-bold uppercase tracking-widest">Premium Audio Learning</div>
      </div>
    </button>
    <nav class="flex gap-3">
      <button onclick="navigate('home')" class="px-5 py-2.5 rounded-2xl hover:bg-white transition-all font-semibold text-slate-600">الرئيسية</button>
      <button onclick="navigate('lessons')" class="px-5 py-2.5 bg-brand-primary text-white rounded-2xl font-bold shadow-md hover:shadow-indigo-200 transition-all">استكشف 🚀</button>
    </nav>
  </div>
</header>

<main id="app" class="max-w-6xl mx-auto px-6 py-12"></main>

<script>
// تم تحديث مفتاح API بناءً على طلبك
const apiKey = "AIzaSyAF0s4wN37-ieIM_fCx5fJF7byHkYyPgs0"; 

const state = {
  route: 'home',
  selectedLessonId: null,
  currentLevel: null,
  isSpeaking: false,
  currentAudio: null,
  activeBtnId: null
};

async function speak(text, elementId, lang = "en-US") {
  if (state.isSpeaking) return; 

  const btn = document.getElementById(elementId);
  if (!btn) return;

  btn.classList.add('playing-btn', 'audio-active');
  state.isSpeaking = true;

  try {
    const promptPrefix = lang === "ar" ? "Explain this lesson clearly in a professional female Arabic voice: " : "Say in a professional female English teaching voice: ";
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: promptPrefix + text }] }],
        generationConfig: {
          responseModalities: ["AUDIO"],
          speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: lang === "ar" ? "Zubenelgenubi" : "Kore" } } }
        },
        model: "gemini-2.5-flash-preview-tts"
      })
    });

    const result = await response.json();
    const audioData = result.candidates[0].content.parts[0].inlineData.data;
    const audioBlob = pcmToWav(audioData, 24000);
    const audio = new Audio(URL.createObjectURL(audioBlob));
    state.currentAudio = audio;

    audio.onended = () => {
      state.isSpeaking = false;
      btn.classList.remove('playing-btn', 'audio-active');
    };
    await audio.play();
  } catch (err) {
    console.error("Audio error:", err);
    state.isSpeaking = false;
    btn.classList.remove('playing-btn', 'audio-active');
  }
}

function pcmToWav(base64, sampleRate) {
  const binary = atob(base64);
  const buffer = new ArrayBuffer(binary.length);
  const view = new Uint8Array(buffer);
  for (let i = 0; i < binary.length; i++) view[i] = binary.charCodeAt(i);
  const wavHeader = new ArrayBuffer(44);
  const dView = new DataView(wavHeader);
  dView.setUint32(0, 0x52494646, false);
  dView.setUint32(4, 36 + buffer.byteLength, true);
  dView.setUint32(8, 0x57415645, false);
  dView.setUint32(12, 0x666d7420, false);
  dView.setUint16(16, 16, true);
  dView.setUint16(20, 1, true);
  dView.setUint16(22, 1, true);
  dView.setUint32(24, sampleRate, true);
  dView.setUint32(28, sampleRate * 2, true);
  dView.setUint16(32, 2, true);
  dView.setUint16(34, 16, true);
  dView.setUint32(36, 0x64617461, false);
  dView.setUint32(40, buffer.byteLength, true);
  return new Blob([wavHeader, buffer], { type: 'audio/wav' });
}

const lessonsDB = [
  { id: 1, level: 1, titleAr: 'فعل الكينونة', titleEn: 'Be Verb', ruleEn: 'Structure: [Subject] + [am / is / are] + [Adjective/Noun]', audioExp: 'أهلاً بك يا بطل! اليوم سنتعلم فعل الكينونة. هو أساس الجملة، تخيل أنه الجسر الذي يربط الشخص بصفته. آم مع آي، إيز مع الشخص الواحد، وآر مع المجموعات.', examples: ['I am a doctor. — أنا طبيب', 'He is brave. — هو شجاع'] },
  { id: 2, level: 1, titleAr: 'الضمائر الشخصية', titleEn: 'Personal Pronouns', ruleEn: 'Subject Pronouns: I, You, He, She, It, We, They', audioExp: 'الضمائر هي المنقذ! بدلاً من تكرار الأسماء، نستخدم هو وهي ونحن. تذكر أن إيت تستخدم لكل ما هو ليس إنساناً.', examples: ['She studies daily. — هي تدرس يومياً', 'They play football. — هم يلعبون'] },
  { id: 11, level: 2, titleAr: 'الماضي البسيط', titleEn: 'Past Simple', ruleEn: 'Rule: Verb + (ed) | Irregular: Go → Went', audioExp: 'هل تتحدث عن الأمس؟ إذاً أنت في عالم الماضي البسيط. فقط أضف إي دي لمعظم الأفعال، لكن انتبه للأفعال المشاكسة التي تتغير تماماً.', examples: ['I visited London. — زرت لندن', 'We went home. — ذهبنا للمنزل'] }
];

function navigate(route, params = {}) {
  state.route = route;
  if (params.level) state.currentLevel = params.level;
  if (params.lessonId) state.selectedLessonId = params.lessonId;
  render();
}

function homeView() {
  return `
    <div class="text-center space-y-12 py-12 animate-in">
      <div class="relative inline-block">
        <div class="absolute -top-10 -right-10 w-24 h-24 bg-brand-accent/20 rounded-full blur-3xl"></div>
        <h1 class="text-7xl font-black text-slate-900 leading-tight">
          تعلم <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-primary to-purple-600">بمتعة</span><br>
          واسمع بتركيز!
        </h1>
      </div>
      <p class="text-2xl text-slate-500 max-w-2xl mx-auto font-medium leading-relaxed">
        وداعاً للملل! الأكاديمية توفر لك شرحاً صوتياً تفاعلياً وقواعد مكتوبة بأسلوب بصري مذهل.
      </p>
      <div class="flex justify-center gap-6 pt-6">
        <button onclick="navigate('lessons')" class="group px-10 py-5 bg-brand-primary text-white rounded-3xl font-bold text-xl shadow-[0_20px_50px_rgba(99,102,241,0.3)] hover:scale-105 transition-all flex items-center gap-3">
          ابدأ رحلتك الآن
          <span class="group-hover:translate-x-1 transition-transform">→</span>
        </button>
      </div>
      <div class="grid grid-cols-3 gap-6 pt-12 max-w-3xl mx-auto">
        <div class="p-6 bg-white rounded-3xl shadow-sm border border-slate-100">
          <div class="text-3xl mb-2">🎧</div>
          <div class="font-bold">استماع ذكي</div>
        </div>
        <div class="p-6 bg-white rounded-3xl shadow-sm border border-slate-100">
          <div class="text-3xl mb-2">📚</div>
          <div class="font-bold">قواعد واضحة</div>
        </div>
        <div class="p-6 bg-white rounded-3xl shadow-sm border border-slate-100">
          <div class="text-3xl mb-2">⭐</div>
          <div class="font-bold">تفاعل حي</div>
        </div>
      </div>
    </div>
  `;
}

function levelsView() {
  return `
    <div class="animate-in space-y-10">
      <div class="text-center">
        <h2 class="text-4xl font-black text-slate-900">خريطة التعلم</h2>
        <p class="text-slate-500 mt-2 font-medium">كل مستوى هو مغامرة جديدة بانتظارك</p>
      </div>
      <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
        ${[1,2,3,4].map(level => `
          <div class="lvl-card bg-white p-10 rounded-[2.5rem] border-2 border-slate-50 shadow-sm hover:shadow-2xl hover:border-brand-primary transition-all text-center group cursor-pointer" onclick="navigate('level-lessons', {level: ${level}})">
            <div class="w-20 h-20 bg-gradient-to-br from-indigo-50 to-white text-brand-primary rounded-3xl flex items-center justify-center mx-auto mb-6 text-3xl font-black shadow-inner group-hover:scale-110 transition-transform">${level}</div>
            <h3 class="font-bold text-2xl mb-2 text-slate-900">المستوى ${level}</h3>
            <p class="text-slate-400 text-sm mb-6">دروس تفاعلية وصوتية</p>
            <div class="py-2 px-4 bg-slate-50 rounded-xl text-slate-400 font-bold group-hover:bg-brand-primary group-hover:text-white transition-colors">دخول</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function levelLessonsView() {
  const lessons = lessonsDB.filter(l => l.level === state.currentLevel);
  return `
    <div class="space-y-8 animate-in">
      <div class="flex justify-between items-center bg-white/60 backdrop-blur-md p-8 rounded-[2.5rem] border border-white shadow-sm">
        <div>
          <h2 class="text-3xl font-black text-brand-primary">المستوى ${state.currentLevel}</h2>
          <p class="text-slate-500 font-medium">اختر درساً لتبدأ الاستماع</p>
        </div>
        <button onclick="navigate('lessons')" class="font-bold text-slate-400 hover:text-brand-secondary px-6 py-3 rounded-2xl bg-white shadow-sm border transition-all">العودة</button>
      </div>
      ${lessons.length > 0 ? `
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
          ${lessons.map(l => `
            <div onclick="navigate('lesson-detail', {lessonId: ${l.id}})" class="cursor-pointer bg-white p-8 rounded-[2rem] border-2 border-transparent hover:border-brand-primary hover:shadow-xl transition-all group flex flex-col justify-between h-56">
              <div>
                <h4 class="font-bold text-2xl group-hover:text-brand-primary transition-colors">${l.titleAr}</h4>
                <p class="english-snippet text-lg text-slate-400 mt-1">${l.titleEn}</p>
              </div>
              <div class="flex items-center gap-2 text-brand-primary font-bold text-sm">
                <span class="w-8 h-8 bg-indigo-50 rounded-full flex items-center justify-center">▶</span>
                ابدأ الدرس الآن
              </div>
            </div>
          `).join('')}
        </div>
      ` : `<div class="p-32 text-center text-slate-300 font-bold bg-white/50 rounded-[3rem] border-4 border-dashed">سيتم توفير الدروس قريباً! 🎈</div>`}
    </div>
  `;
}

function lessonView() {
  const lesson = lessonsDB.find(l => l.id === state.selectedLessonId) || lessonsDB[0];
  return `
    <div class="max-w-4xl mx-auto space-y-8 animate-in pb-20">
      <div class="bg-white p-10 rounded-[3.5rem] border border-white shadow-2xl space-y-10 relative overflow-hidden">
        <!-- زينة خلفية -->
        <div class="absolute top-0 right-0 w-64 h-64 bg-indigo-50/50 rounded-full -mr-32 -mt-32 blur-3xl"></div>
        
        <div class="flex justify-between items-center relative z-10">
           <button id="ar-audio" onclick="speak('${lesson.audioExp.replace(/'/g, "\\'")}', 'ar-audio', 'ar')" class="audio-btn w-24 h-24 bg-gradient-to-tr from-brand-primary to-indigo-400 text-white rounded-[2rem] flex flex-col items-center justify-center hover:rotate-3 transition-all shadow-xl group">
              <span class="text-4xl group-hover:scale-110 transition-transform">🎙️</span>
              <span class="text-[10px] font-bold mt-2 uppercase">استمع الآن</span>
           </button>
           <div class="text-right flex-1 pr-8">
             <div class="inline-block px-4 py-1 bg-brand-soft text-brand-primary rounded-full text-xs font-bold mb-3">درس ${lesson.id} • مستوى ${lesson.level}</div>
             <h1 class="text-5xl font-black text-slate-900">${lesson.titleAr}</h1>
             <p class="english-snippet text-2xl text-slate-400 font-semibold mt-1">${lesson.titleEn}</p>
           </div>
        </div>

        <!-- القاعدة بشكل بطاقة ذكية -->
        <div class="bg-gradient-to-r from-slate-900 to-indigo-950 p-10 rounded-[2.5rem] text-white shadow-2xl relative group">
          <div class="absolute top-4 left-6 text-brand-primary/40 font-black english-snippet text-xs tracking-[0.3em]">GRAMMAR_PROTOCOL_v1.0</div>
          <div class="relative z-10 mt-4">
            <p class="text-3xl font-bold english-snippet leading-relaxed border-l-4 border-brand-primary pl-6 py-2">${lesson.ruleEn}</p>
          </div>
          <div class="absolute right-6 bottom-4 text-white/10 text-6xl font-black italic">RULE</div>
        </div>

        <!-- قسم الأمثلة -->
        <div class="space-y-6">
          <h3 class="font-bold text-2xl text-right flex items-center justify-end gap-3">
             <span class="px-3 py-1 bg-brand-accent/10 text-brand-accent rounded-lg text-sm">Listen carefully</span>
             تدرب على النطق
          </h3>
          <div class="grid gap-4">
            ${lesson.examples.map((ex, idx) => {
              const [en, ar] = ex.split(' — ');
              return `
              <div class="flex justify-between items-center p-6 bg-slate-50 rounded-[2rem] hover:bg-white hover:shadow-lg transition-all cursor-pointer border-2 border-transparent hover:border-brand-primary group" onclick="speak('${en.replace(/'/g, "\\'")}', 'ex-${idx}', 'en')">
                <button id="ex-${idx}" class="audio-btn w-12 h-12 bg-white rounded-2xl text-brand-primary shadow-sm flex items-center justify-center text-xl">▶</button>
                <div class="text-right flex-1 pr-6">
                  <div class="english-snippet font-bold text-2xl text-slate-900 group-hover:text-brand-primary transition-colors">${en}</div>
                  <div class="text-lg font-medium text-slate-400 mt-1">${ar}</div>
                </div>
              </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>

      <div class="flex gap-4">
        <button onclick="navigate('level-lessons',{level:${lesson.level}})" class="flex-1 py-6 bg-brand-soft text-brand-primary rounded-[2rem] font-black hover:bg-brand-primary hover:text-white transition-all shadow-sm">العودة للدروس</button>
        <button onclick="navigate('home')" class="px-10 py-6 bg-white text-slate-300 rounded-[2rem] font-bold hover:text-slate-900 transition-all border shadow-sm text-2xl">🏠</button>
      </div>
    </div>
  `;
}

function render() {
  const content = (state.route === 'home') ? homeView() :
                  (state.route === 'lessons') ? levelsView() :
                  (state.route === 'level-lessons') ? levelLessonsView() :
                  (state.route === 'lesson-detail') ? lessonView() : homeView();
  document.getElementById('app').innerHTML = content;
}

window.onload = render;
</script>

</body>
</html>
