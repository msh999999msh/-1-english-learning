<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elite English Academy</title>

<style>

body{
margin:0;
font-family:Tahoma;
background:#0f172a;
color:white;
}

.container{
width:90%;
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

.levels{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.level{
background:#1e293b;
padding:20px;
border-radius:12px;
}

.lesson{
background:#1e293b;
padding:20px;
margin-top:20px;
border-radius:12px;
}

button{
background:#6366f1;
border:none;
padding:10px 15px;
color:white;
border-radius:8px;
cursor:pointer;
}

audio{
width:100%;
margin-top:10px;
}

.quiz{
margin-top:20px;
}

.result{
margin-top:10px;
font-weight:bold;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.85);
align-items:center;
justify-content:center;
}

.modal-box{
background:#1e293b;
padding:20px;
width:90%;
max-width:700px;
border-radius:12px;
}

input,textarea,select{
width:100%;
margin:5px 0;
padding:8px;
border-radius:6px;
border:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Elite English Academy</h1>

<div id="levels" class="levels"></div>

<div id="lessons"></div>

</div>

<!-- admin login -->

<div id="adminLogin" class="modal">

<div class="modal-box">

<h3>لوحة المطور</h3>

<input id="adminUser" placeholder="username">

<input id="adminPass" type="password" placeholder="password">

<button onclick="loginAdmin()">دخول</button>

</div>

</div>

<!-- admin panel -->

<div id="adminPanel" class="modal">

<div class="modal-box">

<h3>إضافة درس</h3>

<select id="levelSelect"></select>

<input id="title" placeholder="عنوان الدرس">

<textarea id="explanation" placeholder="شرح الدرس"></textarea>

<textarea id="examples" placeholder="Hello | مرحبا"></textarea>

<input id="audio" placeholder="رابط الصوت mp3 (اختياري)">

<textarea id="quiz" placeholder='[{"question":"Hello معناها","choices":["مرحبا","وداعا"],"answer":0}]'></textarea>

<button onclick="addLesson()">إضافة</button>

<button onclick="closeAdmin()">إغلاق</button>

</div>

</div>

<script>

const ADMIN_USERNAME="msh999"
const ADMIN_PASSWORD="123456"

const STORAGE="academy_data"

let data=JSON.parse(localStorage.getItem(STORAGE))||{

levels:[

{
id:1,
title:"Beginner",
lessons:[

{title:"Alphabet",explanation:"تعلم الحروف الإنجليزية",audio:"",examples:[{en:"A",ar:"ا"}],quiz:[]},

{title:"Numbers",explanation:"تعلم الأرقام",audio:"",examples:[{en:"One",ar:"واحد"}],quiz:[]},

{title:"Greetings",explanation:"تعلم التحيات",audio:"",examples:[{en:"Hello",ar:"مرحبا"}],quiz:[]}

]

},

{
id:2,
title:"Intermediate",
lessons:[

{title:"Simple Sentences",explanation:"الجمل البسيطة",audio:"",examples:[{en:"I am happy",ar:"انا سعيد"}],quiz:[]},

{title:"Questions",explanation:"طرح الاسئلة",audio:"",examples:[{en:"How are you",ar:"كيف حالك"}],quiz:[]},

{title:"Daily Words",explanation:"كلمات يومية",audio:"",examples:[{en:"Food",ar:"طعام"}],quiz:[]}

]

},

{
id:3,
title:"Advanced",
lessons:[

{title:"Conversation",explanation:"المحادثة",audio:"",examples:[{en:"Let's talk",ar:"دعنا نتحدث"}],quiz:[]},

{title:"Business English",explanation:"لغة الأعمال",audio:"",examples:[{en:"Meeting",ar:"اجتماع"}],quiz:[]},

{title:"Fluency",explanation:"الطلاقة",audio:"",examples:[{en:"Confidence",ar:"ثقة"}],quiz:[]}

]

}

]

}

function save(){

localStorage.setItem(STORAGE,JSON.stringify(data))

}

function renderLevels(){

let html=""

data.levels.forEach(level=>{

html+=`

<div class="level">

<h3>${level.title}</h3>

<button onclick="openLevel(${level.id})">فتح الدروس</button>

</div>

`

})

document.getElementById("levels").innerHTML=html

}

function openLevel(id){

let level=data.levels.find(l=>l.id==id)

let html=""

level.lessons.forEach((lesson,i)=>{

html+=`

<div class="lesson">

<h3>${lesson.title}</h3>

<p>${lesson.explanation}</p>

${lesson.audio?`

<audio controls>
<source src="${lesson.audio}">
</audio>

`:''}

<h4>أمثلة</h4>

${lesson.examples.map(e=>`
<p><b>${e.en}</b> - ${e.ar}</p>
`).join("")}

</div>

`

})

document.getElementById("lessons").innerHTML=html

}

function loginAdmin(){

let u=document.getElementById("adminUser").value
let p=document.getElementById("adminPass").value

if(u===ADMIN_USERNAME && p===ADMIN_PASSWORD){

document.getElementById("adminLogin").style.display="none"
document.getElementById("adminPanel").style.display="flex"

populateLevels()

}

else{

alert("خطأ")

}

}

function populateLevels(){

let s=document.getElementById("levelSelect")

s.innerHTML=""

data.levels.forEach(l=>{

s.innerHTML+=`<option value="${l.id}">${l.title}</option>`

})

}

function closeAdmin(){

document.getElementById("adminPanel").style.display="none"

}

function addLesson(){

let levelId=Number(document.getElementById("levelSelect").value)

let title=document.getElementById("title").value

let explanation=document.getElementById("explanation").value

let examplesText=document.getElementById("examples").value

let audio=document.getElementById("audio").value

let quiz=JSON.parse(document.getElementById("quiz").value||"[]")

let examples=examplesText.split("\n").map(l=>{

let p=l.split("|")

return{en:p[0],ar:p[1]}

})

let level=data.levels.find(l=>l.id==levelId)

level.lessons.push({

title,
explanation,
audio,
examples,
quiz

})

save()

alert("تم إضافة الدرس")

renderLevels()

}

renderLevels()

/* الاختصار السري للمطور */

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.shiftKey && e.key.toLowerCase()=="m"){

document.getElementById("adminLogin").style.display="flex"

}

})

</script>

</body>
</html>
