<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Elite English Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              indigo: '#4f46e5',
              cyan: '#06b6d4'
            }
          },
          fontFamily: {
            ar: ['IBM Plex Sans Arabic', 'sans-serif'],
            en: ['Outfit', 'sans-serif']
          },
          boxShadow: {
            soft: '0 20px 60px rgba(79,70,229,0.12)'
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html { scroll-behavior: smooth; }
    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: 
        radial-gradient(circle at top right, rgba(6,182,212,0.10), transparent 22%),
        radial-gradient(circle at top left, rgba(79,70,229,0.10), transparent 18%),
        #f8fafc;
    }
    .glass {
      background: rgba(255,255,255,0.72);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.65);
    }
    .visualizer { display:flex; align-items:flex-end; gap:4px; height:32px; }
    .visualizer span {
      width:6px; border-radius:999px; background: linear-gradient(to top, #4f46e5, #06b6d4);
      height:10px; opacity:.45;
    }
    .visualizer.active span { animation: bounce 1s infinite ease-in-out; opacity:1; }
    .visualizer.active span:nth-child(2){ animation-delay:.1s; }
    .visualizer.active span:nth-child(3){ animation-delay:.2s; }
    .visualizer.active span:nth-child(4){ animation-delay:.3s; }
    .visualizer.active span:nth-child(5){ animation-delay:.4s; }
    @keyframes bounce {
      0%,100%{ transform:scaleY(.45); }
      50%{ transform:scaleY(1.5); }
    }
    .lesson-card { transition: all 0.3s ease; }
    .lesson-card:hover { transform: translateY(-4px); }
    .fade-in { animation: fade .35s ease; }
    @keyframes fade { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:translateY(0)} }
    .english-snippet { direction:ltr; text-align:left; font-family:'Outfit', sans-serif; }
    .prose-elite p { margin-bottom: 1rem; line-height: 2; }
    .prose-elite ul { list-style: disc; padding-inline-start: 1.25rem; }
  </style>
</head>
<body class="text-slate-800">
  <header class="glass sticky top-0 z-50 border-b border-white/70">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between py-4 gap-4">
        <button onclick="navigate('home')" class="flex items-center gap-3">
          <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-brand-indigo to-brand-cyan text-white flex items-center justify-center shadow-soft text-xl">🎓</div>
          <div class="text-right">
            <div class="font-bold text-lg text-slate-900 leading-tight">Elite English</div>
            <div class="text-[10px] text-slate-500 english-snippet uppercase tracking-widest">Professional Learning</div>
          </div>
        </button>
        <nav class="flex items-center gap-2">
          <button onclick="navigate('home')" class="hidden md:block px-4 py-2 rounded-full text-sm font-semibold text-slate-700 hover:bg-white transition">الرئيسية</button>
          <button onclick="navigate('lessons')" class="px-4 py-2 rounded-full text-sm font-semibold bg-brand-indigo text-white shadow-lg shadow-indigo-200 hover:scale-105 transition">المنهج</button>
        </nav>
      </div>
    </div>
  </header>

  <main id="app" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8"></main>

  <script>
    const STORAGE_KEY = 'eliteEnglishAcademyStateV2';

    let state = {
      route: 'home',
      selectedLessonId: null,
      isPlaying: false,
      progress: loadProgress()
    };

    // تحميل التقدم الدراسي
    function loadProgress() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : { completedLessonIds: [], unlockedLevels: [1], quizScores: {} };
      } catch (e) {
        return { completedLessonIds: [], unlockedLevels: [1], quizScores: {} };
      }
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
    }

    const lessonsDB = [
      { id: 1, titleAr: 'فعل الكينونة', titleEn: 'Be with Pronouns', description: 'أساس الجملة الاسمية والتعريف بالنفس.', quiz: { question: 'أي جملة صحيحة؟', options: ['She are happy.', 'She is happy.', 'She am happy.'], correctIndex: 1 }, voiceText: "مرحباً بكم في أكاديمية النخبة. اليوم سنتعلم فعل الكينونة بأسلوب بسيط. نستخدم am مع الضمير آي، و is مع المفرد، و are مع الجمع. مثال توضيحي: I am a teacher. تذكروا دائماً، الجملة الإنجليزية لا تكتمل بدون فعل." },
      { id: 2, titleAr: 'الضمائر الشخصية', titleEn: 'Personal Pronouns', description: 'تعلم كيف تشير للأشخاص والأشياء بذكاء.', quiz: { question: 'ما هو ضمير الغائب للمذكر؟', options: ['She', 'He', 'It'], correctIndex: 1 }, voiceText: "الضمائر الشخصية هي مفتاح التحدث بذكاء. نستخدم He للإشارة للرجل، و She للمرأة، أما It فهي لكل ما هو غير عاقل. استخدام الضمائر يساعدنا على تجنب التكرار الممل في الكلام." },
      { id: 3, titleAr: 'أدوات التعريف والتنكير', titleEn: 'Articles', description: 'متى نستخدم a و an و the؟', quiz: { question: '___ Apple', options: ['A', 'An', 'The'], correctIndex: 1 }, voiceText: "متى نستخدم أدوات التعريف؟ نضع a قبل الأسماء التي تبدأ بصوت ساكن، ونضع an قبل الأسماء التي تبدأ بصوت متحرك مثل أبل. أما the فهي مخصصة للأشياء المعروفة والمحددة مسبقاً." },
      { id: 5, titleAr: 'المضارع البسيط', titleEn: 'Present Simple', description: 'لغة العادات والروتين اليومي.', quiz: { question: 'He ___ coffee.', options: ['drink', 'drinks', 'drinking'], correctIndex: 1 }, voiceText: "المضارع البسيط هو لغة الحقائق والروتين اليومي. قاعدة ذهبية: لا تنسوا إضافة حرف S للفعل عندما يكون الفاعل هو He أو She أو It." }
    ];

    function navigate(route, lessonId = null) {
      state.route = route;
      state.selectedLessonId = lessonId;
      stopAudio();
      render();
    }

    function stopAudio() {
      if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
      }
      state.isPlaying = false;
      updateTTSUI(false);
    }

    function render() {
      const app = document.getElementById('app');
      if (state.route === 'home') app.innerHTML = renderHome();
      else if (state.route === 'lessons') app.innerHTML = renderLessons();
      else if (state.route === 'lesson') app.innerHTML = renderLesson(state.selectedLessonId);
    }

    function renderHome() {
      return `
        <div class="fade-in space-y-12 py-12">
          <div class="text-center space-y-4 max-w-3xl mx-auto">
            <span class="px-4 py-1.5 rounded-full bg-indigo-50 text-brand-indigo text-xs font-bold uppercase tracking-widest">أكاديمية النخبة</span>
            <h1 class="text-4xl md:text-6xl font-bold text-slate-900 tracking-tight">أتقن الإنجليزية <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-indigo to-brand-cyan">بأسلوب عصري</span></h1>
            <p class="text-lg text-slate-600 leading-relaxed">تعلم القواعد بذكاء من خلال شرح صوتي تفاعلي واختبارات فورية.</p>
            <button onclick="navigate('lessons')" class="mt-8 px-8 py-4 bg-brand-indigo text-white rounded-2xl font-bold shadow-xl shadow-indigo-200 hover:scale-105 transition">ابدأ الآن</button>
          </div>
        </div>
      `;
    }

    function renderLessons() {
      return `
        <div class="fade-in space-y-8">
          <h2 class="text-3xl font-bold text-slate-900">منهجك الدراسي</h2>
          <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
            ${lessonsDB.map(lesson => `
              <button onclick="navigate('lesson', ${lesson.id})" class="lesson-card text-right glass p-6 rounded-3xl border-white/40 hover:border-brand-indigo group">
                <div class="flex justify-between items-start mb-4">
                  <div class="w-10 h-10 rounded-xl bg-indigo-50 flex items-center justify-center text-brand-indigo font-bold">${lesson.id}</div>
                  ${state.progress.completedLessonIds.includes(lesson.id) ? '<span class="text-emerald-500 font-bold text-sm">✓ تم</span>' : ''}
                </div>
                <h3 class="font-bold text-lg mb-1">${lesson.titleAr}</h3>
                <p class="text-sm english-snippet text-slate-400 mb-2">${lesson.titleEn}</p>
              </button>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderLesson(id) {
      const lesson = lessonsDB.find(l => l.id === id);
      return `
        <div class="fade-in max-w-4xl mx-auto space-y-8">
          <button onclick="navigate('lessons')" class="text-slate-500 hover:text-brand-indigo flex items-center gap-2"><span>→</span> العودة</button>
          <div class="glass p-8 md:p-12 rounded-[2rem] shadow-soft">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
              <div>
                <h1 class="text-3xl font-bold">${lesson.titleAr}</h1>
                <p class="text-xl english-snippet text-slate-400">${lesson.titleEn}</p>
              </div>
              <div class="flex items-center gap-4">
                <div id="visualizer" class="visualizer ${state.isPlaying ? 'active' : ''}">
                  <span></span><span></span><span></span><span></span><span></span>
                </div>
                <button id="ttsBtn" onclick="playLessonAudio(${lesson.id})" class="px-6 py-3 bg-slate-900 text-white rounded-2xl font-bold hover:bg-brand-indigo transition">
                  <span id="ttsText">🔊 شرح صوتي</span>
                </button>
              </div>
            </div>
            <p class="text-lg leading-relaxed text-slate-700">${lesson.description}</p>
          </div>
          <div class="glass p-8 md:p-12 rounded-[2rem] shadow-soft space-y-6">
            <h3 class="text-2xl font-bold">اختبار سريع</h3>
            <p class="text-lg font-medium">${lesson.quiz.question}</p>
            <div class="grid gap-3">
              ${lesson.quiz.options.map((opt, idx) => `
                <button onclick="checkQuiz(${lesson.id}, ${idx}, this)" class="quiz-opt-btn text-right p-5 rounded-2xl border-2 border-slate-100 hover:border-brand-indigo font-medium">
                  ${opt}
                </button>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    // --- تحسين منطق الصوت لضمان العمل على جميع المتصفحات ---
    function playLessonAudio(lessonId) {
      if (state.isPlaying) {
        stopAudio();
        return;
      }

      const lesson = lessonsDB.find(l => l.id === lessonId);
      if (!window.speechSynthesis) {
        alert("المتصفح لا يدعم الصوت.");
        return;
      }

      // إلغاء أي صوت حالي لتجنب التداخل
      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(lesson.voiceText);
      
      // اختيار الصوت بعناية
      const voices = window.speechSynthesis.getVoices();
      
      // الأولوية للصوت الأنثوي العربي المتقن
      const arabicVoice = voices.find(v => v.lang.startsWith('ar') && (v.name.includes('Laila') || v.name.includes('Female') || v.name.includes('Google'))) 
                         || voices.find(v => v.lang.startsWith('ar'));

      if (arabicVoice) {
        utterance.voice = arabicVoice;
      }
      
      utterance.lang = 'ar-SA';
      utterance.pitch = 1.1; // نبرة تعليمية واضحة
      utterance.rate = 0.85; // سرعة هادئة للفهم

      utterance.onstart = () => {
        state.isPlaying = true;
        updateTTSUI(true);
      };

      utterance.onend = () => {
        state.isPlaying = false;
        updateTTSUI(false);
      };

      utterance.onerror = () => {
        state.isPlaying = false;
        updateTTSUI(false);
      };

      window.speechSynthesis.speak(utterance);
    }

    function updateTTSUI(playing) {
      const viz = document.getElementById('visualizer');
      const text = document.getElementById('ttsText');
      if (viz) playing ? viz.classList.add('active') : viz.classList.remove('active');
      if (text) text.innerText = playing ? "🛑 إيقاف" : "🔊 شرح صوتي";
    }

    function checkQuiz(lessonId, selectedIdx, el) {
      const lesson = lessonsDB.find(l => l.id === lessonId);
      const btns = document.querySelectorAll('.quiz-opt-btn');
      btns.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === lesson.quiz.correctIndex) btn.classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-700');
        else if (idx === selectedIdx) btn.classList.add('bg-rose-50', 'border-rose-500', 'text-rose-700');
      });
      if (selectedIdx === lesson.quiz.correctIndex) {
        if (!state.progress.completedLessonIds.includes(lessonId)) {
          state.progress.completedLessonIds.push(lessonId);
          saveProgress();
        }
      }
    }

    // حل مشكلة تأخر تحميل الأصوات في المتصفحات
    if (window.speechSynthesis.onvoiceschanged !== undefined) {
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    window.onload = render;
  </script>
</body>
</html>
