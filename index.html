      return lessonsDB.filter(l => l.level === level);
    }

    function getLesson(id) {
      return lessonsDB.find(l => l.id === Number(id));

    function levelProgress(level) {
      const lessonIds = getLessonsByLevel(level).map(l => l.id);
      const completed = lessonIds.filter(id => state.progress.completedLessonIds.includes(id)).length;
      return Math.round((completed / lessonIds.length) * 100);
    }

    function isLessonLocked(lesson) {
      return !state.progress.unlockedLevels.includes(lesson.level);
    }

    function markLessonComplete(id) {
      if (!state.progress.completedLessonIds.includes(id)) {
        state.progress.completedLessonIds.push(id);
      }
      const lesson = getLesson(id);
      const currentLevelLessons = getLessonsByLevel(lesson.level);
      const allCompleted = currentLevelLessons.every(l => state.progress.completedLessonIds.includes(l.id));
      if (allCompleted && lesson.level < 4 && !state.progress.unlockedLevels.includes(lesson.level + 1)) {
        state.progress.unlockedLevels.push(lesson.level + 1);
      }
      state.progress.lastLessonId = id;
      saveProgress();
    }

      state.route = route;

    async function playLessonAudio(lessonId) {
      const lesson = getLesson(lessonId);
      try {
        stopAudio();
        state.isPlaying = true;
        render();
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${GEMINI_API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: lesson.voiceScript }] }],
            generationConfig: {
              responseModalities: ['AUDIO'],
              speechConfig: {
                voiceConfig: { prebuiltVoiceConfig: { voiceName: 'Kore' } }
              }
            },
            model: 'gemini-2.5-flash-preview-tts'
          })
        });

        const data = await response.json();
        const audioBase64 = data?.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
        if (!audioBase64) throw new Error('No audio data returned');
        state.currentAudioBlob = pcm16ToWav(audioBase64, 24000);
        const url = URL.createObjectURL(state.currentAudioBlob);
        const audio = new Audio(url);
        state.audio = audio;
        audio.onended = () => { state.isPlaying = false; render(); };
        audio.onerror = () => { state.isPlaying = false; render(); };
        await audio.play();
      } catch (error) {
        console.error(error);
        alert('تعذر تشغيل الصوت الآن. تأكد من الاتصال بالإنترنت وصحة المفتاح البرمجي.');
        state.isPlaying = false;
        render();
      }
    }

    function stopAudio() {
      if (state.audio) {
        state.audio.pause();
        state.audio.currentTime = 0;
      }
      state.isPlaying = false;
    }

    function pcm16ToWav(base64Data, sampleRate) {
      const binary = atob(base64Data);
      const pcmData = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) pcmData[i] = binary.charCodeAt(i);
      const wavBuffer = new ArrayBuffer(44 + pcmData.length);
      const view = new DataView(wavBuffer);

      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + pcmData.length, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, 'data');
      view.setUint32(40, pcmData.length, true);

      const wavBytes = new Uint8Array(wavBuffer);
      wavBytes.set(pcmData, 44);
      return new Blob([wavBuffer], { type: 'audio/wav' });
    }

    function writeString(view, offset, string) {
      for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
      }
    }

    function downloadAudio(lessonId) {
      if (!state.currentAudioBlob) {
        alert('شغّل الصوت أولًا ثم حاول التحميل.');
        return;
      }
      const lesson = getLesson(lessonId);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(state.currentAudioBlob);
      a.download = `${slugify(lesson.titleEn)}.wav`;

            <button onclick="navigate('lesson-detail', { lessonId: ${lessonId} })" class="px-5 py-3 rounded-2xl bg-white border border-slate-200 text-slate-700 font-bold">العودة للدرس</button>
            <button onclick="goToNextLesson(${lessonId})" class="px-5 py-3 rounded-2xl bg-brand-indigo text-white font-bold">الدرس التالي</button>
          </div>
        </div>
      `;
      renderProgressIfNeeded();
    }

    function renderProgressIfNeeded() {
      // placeholder to keep state extensible
    }

    function goToNextLesson(currentId) {
      const next = getLesson(currentId + 1);
      if (next && !isLessonLocked(next)) navigate('lesson-detail', { lessonId: next.id });
      else navigate('lessons');
    }

    render();
  </script>
</body>
</html>
