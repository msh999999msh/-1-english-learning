<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Elite English Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { indigo: '#4f46e5', cyan: '#06b6d4' }
          },
          fontFamily: {
            ar: ['IBM Plex Sans Arabic','sans-serif'],
            en: ['Outfit','sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
  body{font-family:'IBM Plex Sans Arabic',sans-serif;background:#f8fafc}
  .english-snippet{direction:ltr;text-align:left;font-family:'Outfit',sans-serif}
  .visualizer{display:flex;gap:4px;height:30px;align-items:flex-end}
  .visualizer span{width:6px;background:#4f46e5;border-radius:10px;height:8px}
  </style>
</head>

<body class="text-slate-800">

<header class="bg-white border-b">
<div class="max-w-7xl mx-auto px-4 py-4 flex justify-between">

<button onclick="navigate('home')" class="flex items-center gap-3">
<div class="w-10 h-10 bg-brand-indigo text-white flex items-center justify-center rounded-xl">🎓</div>
<div>
<div class="font-bold">The Elite English Academy</div>
<div class="text-xs english-snippet text-slate-500">Professional Arabic-English Learning</div>
</div>
</button>

<nav class="flex gap-2">
<button onclick="navigate('home')" class="px-4 py-2 bg-slate-100 rounded-xl">الرئيسية</button>
<button onclick="navigate('lessons')" class="px-4 py-2 bg-brand-indigo text-white rounded-xl">ابدأ الآن</button>
</nav>

</div>
</header>

<main id="app" class="max-w-7xl mx-auto px-4 py-10"></main>

<script>

const STORAGE_KEY="academy_progress_v1";

const state={
route:'home',
selectedLessonId:null,
currentLevel:null,
progress:loadProgress()
};

function loadProgress(){
const s=localStorage.getItem(STORAGE_KEY);
if(s) return JSON.parse(s);
return {completed:[], unlockedLevels:[1]};
}

function saveProgress(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state.progress));}

/* ---------------- LESSON DATABASE (SHORTENED) ---------------- */

const lessonsDB=[
{id:1,level:1,titleAr:'فعل الكينونة',titleEn:'Be Verb',description:'أساس بناء الجملة الإنجليزية.'},
{id:2,level:1,titleAr:'الضمائر',titleEn:'Pronouns',description:'التعرف على الضمائر الأساسية.'},
{id:3,level:1,titleAr:'أدوات التعريف',titleEn:'Articles',description:'فهم a / an / the.'},
{id:4,level:1,titleAr:'الجمع',titleEn:'Plurals',description:'تحويل المفرد إلى جمع.'},
{id:5,level:1,titleAr:'المضارع البسيط',titleEn:'Present Simple',description:'وصف العادات اليومية.'},
{id:6,level:1,titleAr:'الأسئلة',titleEn:'Questions',description:'صياغة الأسئلة.'},
{id:7,level:1,titleAr:'النفي',titleEn:'Negatives',description:'بناء الجمل المنفية.'},
{id:8,level:1,titleAr:'أسماء الإشارة',titleEn:'Demonstratives',description:'this / that / these / those'},
{id:9,level:1,titleAr:'صفات الملكية',titleEn:'Possessive',description:'my / your / his'},
{id:10,level:1,titleAr:'أسئلة Wh',titleEn:'Wh Questions',description:'where / why / when'},

{id:11,level:2,titleAr:'الماضي البسيط',titleEn:'Past Simple',description:'التحدث عن الماضي.'},
{id:12,level:2,titleAr:'الأفعال غير المنتظمة',titleEn:'Irregular verbs',description:'أفعال الماضي.'},

{id:21,level:3,titleAr:'المضارع التام',titleEn:'Present Perfect',description:'ربط الماضي بالحاضر.'},

{id:31,level:4,titleAr:'الماضي التام',titleEn:'Past Perfect',description:'تسلسل الأحداث.'}
];

/* ---------------- ROUTER ---------------- */

function navigate(route,params={}){
state.route=route;
if(params.level) state.currentLevel=params.level;
if(params.lessonId) state.selectedLessonId=params.lessonId;
render();
}

function router(){

if(state.route==='home') return homeView();

if(state.route==='lessons') return levelsView();

if(state.route==='level-lessons') return levelLessonsView();

if(state.route==='lesson-detail') return lessonView();

return homeView();
}

/* ---------------- HOME ---------------- */

function homeView(){
return `
<section class="text-center space-y-6">

<span class="inline-block bg-white px-4 py-2 rounded-full border">✨ منصة احترافية لتعلّم الإنجليزية</span>

<h1 class="text-4xl font-bold">
تعلم اللغة الانجليزية باحتراف
</h1>

<p class="text-slate-600">منهج احترافي من عدة مستويات مع دروس تفاعلية.</p>

<button onclick="navigate('lessons')" class="px-8 py-4 bg-brand-indigo text-white rounded-xl">ابدأ التعلم</button>

</section>
`}

/* ---------------- LEVELS ---------------- */

function levelsView(){

return `

<section class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">

${[1,2,3,4].map(level=>{

const unlocked=state.progress.unlockedLevels.includes(level);

return `

<div class="bg-white p-6 rounded-2xl border space-y-4 ${!unlocked?'opacity-50':''}">

<h3 class="font-bold text-xl">المستوى ${level}</h3>

<button ${unlocked?`onclick="openLevel(${level})"`:''}
class="w-full py-3 rounded-xl ${unlocked?'bg-brand-indigo text-white':'bg-slate-200'}">
استعراض الدروس
</button>

</div>

`}).join('')}

</section>

`}

/* ---------------- LEVEL LESSON LIST PAGE ---------------- */

function openLevel(level){
state.currentLevel=level;
navigate('level-lessons',{level});
}

function levelLessonsView(){

const lessons=lessonsDB.filter(l=>l.level===state.currentLevel);

return `

<section>

<h2 class="text-3xl font-bold mb-6">دروس المستوى ${state.currentLevel}</h2>

<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">

${lessons.map(l=>`

<div onclick="openLesson(${l.id})" class="cursor-pointer bg-white p-5 rounded-xl border hover:shadow">

<h4 class="font-bold">${l.titleAr}</h4>

<p class="english-snippet text-sm text-slate-500">${l.titleEn}</p>

<p class="text-sm text-slate-600 mt-2">${l.description}</p>

</div>

`).join('')}

</div>

</section>

`}

/* ---------------- LESSON PAGE ---------------- */

function openLesson(id){
state.selectedLessonId=id;
navigate('lesson-detail',{lessonId:id});
}

function lessonView(){

const lesson=lessonsDB.find(l=>l.id===state.selectedLessonId);

return `

<section class="space-y-6">

<h1 class="text-3xl font-bold">${lesson.titleAr}</h1>

<p class="english-snippet text-slate-500">${lesson.titleEn}</p>

<p>${lesson.description}</p>

<button onclick="navigate('level-lessons',{level:${lesson.level}})"
class="px-6 py-3 bg-slate-200 rounded-xl">
العودة لدروس المستوى
</button>

</section>

`}

/* ---------------- RENDER ---------------- */

function render(){

document.getElementById('app').innerHTML=router();

}

render();

</script>

</body>
</html>
