<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite English Academy</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.container{
width:90%;
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

.levels{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.level{
background:#1e293b;
padding:20px;
border-radius:12px;
}

.lesson{
background:#1e293b;
padding:20px;
margin-top:20px;
border-radius:12px;
}

button{
background:#6366f1;
border:none;
padding:10px 15px;
color:white;
border-radius:8px;
cursor:pointer;
}

audio{
width:100%;
margin-top:10px;
}

iframe{
width:100%;
height:300px;
border:none;
margin-top:10px;
}

.quiz{
margin-top:20px;
}

.choice{
margin:8px 0;
}

.result{
margin-top:10px;
font-weight:bold;
}

/* زر المطور المخفي */

.dev-button{
position:fixed;
bottom:5px;
left:5px;
font-size:12px;
opacity:0.35;
cursor:pointer;
}

/* مودال */

.modal{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.8);
align-items:center;
justify-content:center;
}

.modal-content{
background:#1e293b;
padding:20px;
width:90%;
max-width:700px;
border-radius:12px;
}

input,textarea{
width:100%;
margin:5px 0;
padding:8px;
border-radius:6px;
border:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Elite English Academy</h1>

<div id="levels" class="levels"></div>

<div id="lessons"></div>

</div>


<!-- زر المطور -->
<div class="dev-button" onclick="openLogin()">msh999</div>



<!-- تسجيل دخول المطور -->

<div id="loginModal" class="modal">
<div class="modal-content">

<h3>دخول المطور</h3>

<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">

<button onclick="login()">دخول</button>

</div>
</div>



<!-- لوحة المطور -->

<div id="adminModal" class="modal">
<div class="modal-content">

<h3>لوحة المطور</h3>

<h4>إضافة درس</h4>

<select id="lessonLevel"></select>

<input id="title" placeholder="عنوان الدرس">

<textarea id="explanation" placeholder="شرح الدرس"></textarea>

<textarea id="examples" placeholder="examples example | مثال"></textarea>

<input id="audio" placeholder="رابط الصوت mp3">

<input id="video" placeholder="رابط الفيديو embed">

<textarea id="quiz" placeholder='[{"question":"Hello معناها","choices":["مرحبا","وداعا"],"answer":0}]'></textarea>

<button onclick="addLesson()">إضافة درس</button>

<button onclick="closeAdmin()">إغلاق</button>

</div>
</div>



<script>

const ADMIN_USERNAME="msh999"
const ADMIN_PASSWORD="123456"

const STORAGE="academy_data"

let data=JSON.parse(localStorage.getItem(STORAGE))||{

levels:[
{
id:1,
title:"Beginner",
lessons:[]
},
{
id:2,
title:"Intermediate",
lessons:[]
},
{
id:3,
title:"Advanced",
lessons:[]
}
]

}

function save(){

localStorage.setItem(STORAGE,JSON.stringify(data))

}

function renderLevels(){

let html=""

data.levels.forEach(level=>{

html+=`

<div class="level">

<h3>${level.title}</h3>

<button onclick="openLevel(${level.id})">فتح الدروس</button>

</div>

`

})

document.getElementById("levels").innerHTML=html

}

function openLevel(id){

let level=data.levels.find(l=>l.id==id)

let html=""

level.lessons.forEach((lesson,i)=>{

html+=`

<div class="lesson">

<h3>${lesson.title}</h3>

<p>${lesson.explanation}</p>


${lesson.audio?`
<audio controls>
<source src="${lesson.audio}">
</audio>
`:''}


${lesson.video?`
<iframe src="${lesson.video}"></iframe>
`:''}


<h4>أمثلة</h4>

${lesson.examples.map(e=>`
<p><b>${e.en}</b> - ${e.ar}</p>
`).join("")}


<div class="quiz">

<h4>اختبار</h4>

${lesson.quiz.map((q,qi)=>`

<div>

<p>${q.question}</p>

${q.choices.map((c,ci)=>`
<div class="choice">
<label>
<input type="radio" name="q${qi}" value="${ci}">
${c}
</label>
</div>
`).join("")}

</div>

`).join("")}

<button onclick="checkQuiz(${id},${i})">تصحيح</button>

<div class="result" id="result${i}"></div>

</div>

</div>

`

})

document.getElementById("lessons").innerHTML=html

}

function checkQuiz(levelIndex,lessonIndex){

let lesson=data.levels.find(l=>l.id==levelIndex).lessons[lessonIndex]

let correct=0

lesson.quiz.forEach((q,i)=>{

let val=document.querySelector(`input[name=q${i}]:checked`)

if(val && Number(val.value)==q.answer)correct++

})

let score=Math.round(correct/lesson.quiz.length*100)

document.getElementById("result"+lessonIndex).innerText="النتيجة "+score+"%"

}

function openLogin(){

document.getElementById("loginModal").style.display="flex"

}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u===ADMIN_USERNAME && p===ADMIN_PASSWORD){

document.getElementById("loginModal").style.display="none"

openAdmin()

}

else{

alert("خطأ")

}

}

function openAdmin(){

document.getElementById("adminModal").style.display="flex"

populateLevels()

}

function closeAdmin(){

document.getElementById("adminModal").style.display="none"

}

function populateLevels(){

let s=document.getElementById("lessonLevel")

s.innerHTML=""

data.levels.forEach(l=>{

s.innerHTML+=`<option value="${l.id}">${l.title}</option>`

})

}

function addLesson(){

let levelId=Number(document.getElementById("lessonLevel").value)

let title=document.getElementById("title").value

let explanation=document.getElementById("explanation").value

let examplesText=document.getElementById("examples").value

let audio=document.getElementById("audio").value

let video=document.getElementById("video").value

let quiz=JSON.parse(document.getElementById("quiz").value)

let examples=examplesText.split("\n").map(l=>{

let p=l.split("|")

return{en:p[0],ar:p[1]}

})

let level=data.levels.find(l=>l.id==levelId)

level.lessons.push({

title,
explanation,
examples,
audio,
video,
quiz

})

save()

alert("تم إضافة الدرس")

renderLevels()

}

renderLevels()

</script>

</body>
</html>
